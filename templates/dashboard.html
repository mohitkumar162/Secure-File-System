<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="background"></div>

    <div class="container">
        <!-- Logout -->
        <a href="{{ url_for('logout') }}" class="float-btn logout-btn">Logout</a>

        <h1>Secure File System</h1>

        <!-- Upload -->
        <form method="POST" enctype="multipart/form-data" action="{{ url_for('upload_file') }}">
            <input type="file" name="file" required>
            <button class="float-btn upload-btn" type="submit">Upload</button>
        </form>

        <!-- File List -->
        <h2>Your Files</h2>

        <ol class="file-list">
            {% for file in files %}
                <li style="margin:10px 0;">
                    
                    <span class="file-name">{{ file }}</span>

                    <!-- Download -->
                    <a href="{{ url_for('download_file', filename=file) }}" 
                       class="float-btn download-btn">
                        Download
                    </a>

                    <!-- Delete -->
                    <form action="{{ url_for('delete_file', filename=file) }}" 
                          method="POST" 
                          style="display:inline;">
                        
                        <button type="submit" 
                                onclick="return confirm('Are you sure you want to delete this file?')"
                                style="background:red; color:white; border:none; padding:5px 10px; margin-left:5px;">
                            Delete
                        </button>
                    </form>

                </li>
            {% endfor %}
        </ol>

    </div>

    <script src="{{ url_for('static', filename='js/three.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
